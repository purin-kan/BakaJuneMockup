<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAKA Index Sugarcane App</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              green: '#2d7a3a',
              teal: '#0ea5e9',
              dark: '#1f2937',
              gray: '#6b7280',
              light: '#f3f4f6',
            }
          }
        }
      }
    }
  </script>

  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
</head>
<body class="h-screen w-screen overflow-hidden bg-gray-100 flex flex-col font-sans text-sm text-gray-800">

  <!-- HEADER -->
  <header class="h-[70px] flex items-center justify-between px-4 z-50 shrink-0 relative" style="background-color: #f8f8f8; border-bottom: 1px solid #D9D9D9;">
    <div class="flex items-center">
      <img src="assets/baka_index_sugarcane.jpg" alt="BAKA Index Sugarcane" class="h-[50px] w-auto object-contain">
    </div>

    <!-- Search Bar (Visual Only) -->
    <div class="absolute left-1/2 -translate-x-1/2 w-[640px] max-w-full search-field">
      <svg class="search-icon" viewBox="0 0 24 24" focusable="false">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
      </svg>
      <input class="search-textbox" type="text" placeholder="Search places">
    </div>

    <div class="flex items-center">
      <img src="assets/google_earth_engine_apps.svg" alt="Google Earth Engine Apps" class="h-6.5 w-auto">
    </div>
  </header>

  <!-- MAIN MAP AREA -->
  <main class="flex-1 relative overflow-hidden bg-gray-200" id="map-container">
    <!-- Static Satellite Background -->
    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('assets/satellite.png');"></div>
    
    <!-- SVG Map Overlays Mount -->
    <svg id="map-overlays" class="absolute inset-0 w-full h-full pointer-events-none z-10"></svg>

    <!-- FLOATING PANEL MOUNTS (Overlays) -->
    
    <!-- Left Sidebar -->
    <div id="panel-leftSidebar" class="absolute top-0 left-0 z-20 transition-all duration-200"></div>
    
    <!-- BAKA ID panel -->
    <div id="panel-bakaId" class="absolute top-4 z-20" style="left: 341px; transition: left 0.3s;"></div>

    <!-- Map Mode -->
    <div id="panel-mapMode" class="absolute top-4 z-20" style="right: 16px; transition: right 0.3s;"></div>

    <!-- Fullscreen Button (separate from map mode) -->
    <button id="btn-fullscreen" class="absolute z-20 bg-white border border-gray-300 shadow-md p-1.5 hover:bg-gray-50" style="top: calc(1rem + 70px); right: 16px; transition: right 0.3s;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
      </svg>
    </button>

    <!-- Zoom Buttons -->
    <div id="zoom-buttons" class="absolute z-20 flex flex-col shadow-md border border-gray-200 overflow-hidden bg-white" style="top: 210px; left: 341px; transition: left 0.3s;">
      <button id="zoom-in" class="w-8 h-8 text-xl font-light text-gray-700 hover:bg-gray-100 border-b border-gray-200 flex items-center justify-center">+</button>
      <button id="zoom-out" class="w-8 h-8 text-xl font-light text-gray-700 hover:bg-gray-100 flex items-center justify-center">−</button>
    </div>

    <!-- Analysis Results (Top Right) -->
    <!-- <div id="panel-analysisResults" class="absolute top-4 right-[340px] z-20 transition-all duration-200 hidden"></div> -->

    <!-- Right Sidebar -->
    <div id="panel-rightSidebar" class="absolute top-0 right-0 z-20 hidden"></div>

    <!-- Legend -->
    <div id="panel-legend" class="absolute z-20 hidden" style="bottom: 24px; left: 333px; transition: left 0.3s;"></div>

    <!-- Processing Status -->
    <div id="panel-processing" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 transition-all duration-200 hidden"></div>

    <!-- User Manual -->
    <div id="panel-userManual" class="absolute bottom-4 z-20" style="right: 16px; transition: right 0.3s;"></div>

    <!-- Google Logo -->
    <div id="google-logo" class="absolute bottom-0 z-20" style="left: 333px; transition: left 0.3s;">
      <img src="assets/google.svg" alt="Google" class="h-6 w-auto">
    </div>

  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 pointer-events-none"></div>

  <!-- Chart Fullscreen Modal Mount -->
  <div id="modal-container" class="fixed inset-0 z-[100] hidden bg-black/60 flex items-center justify-center p-8 backdrop-blur-sm opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-lg shadow-2xl w-full max-w-4xl h-full max-h-[80vh] flex flex-col">
      <div class="flex justify-between items-center p-4 border-b">
        <h3 id="modal-title" class="font-semibold text-lg">Chart</h3>
        <button id="modal-close" class="text-gray-500 hover:text-black">✖</button>
      </div>
      <div class="flex-1 p-4 relative bg-gray-50">
        <canvas id="modal-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Dev Toolbar -->
  <div id="dev-toolbar-mount"></div>

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
